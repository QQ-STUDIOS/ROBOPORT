name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Validate schemas & scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate JSON schemas parse
        run: |
          python -c "
          import json, glob, sys
          ok = True
          for p in glob.glob('resources/schemas/*.json'):
              try: json.load(open(p))
              except Exception as e:
                  print(f'FAIL {p}: {e}'); ok = False
          for p in glob.glob('resources/examples/*.json') + glob.glob('resources/datasets/*.json') + ['agents/registry.json', 'evals/evals.json']:
              try: json.load(open(p))
              except Exception as e:
                  print(f'FAIL {p}: {e}'); ok = False
          sys.exit(0 if ok else 1)
          "

      - name: Validate YAML configs
        run: |
          python -c "
          import yaml, glob, sys
          ok = True
          for p in glob.glob('config/*.yaml') + glob.glob('config/*.yml'):
              try: yaml.safe_load(open(p))
              except Exception as e:
                  print(f'FAIL {p}: {e}'); ok = False
          sys.exit(0 if ok else 1)
          "

      - name: Compile Python scripts
        run: python -m compileall -q scripts

  tests:
    name: Tests & regression gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run test suite
        run: python -m pytest tests/ -q

      - name: diff_runs regression-gate smoke
        run: |
          # a clean comparison passes the gate
          python scripts/diff_runs.py \
            --baseline tests/fixtures/runs/base \
            --candidate tests/fixtures/runs/base \
            --fail-on regression --quiet
          # a known regression MUST fail the gate (here, nonzero is the success path)
          if python scripts/diff_runs.py \
            --baseline tests/fixtures/runs/base \
            --candidate tests/fixtures/runs/cand_schema \
            --fail-on regression --quiet; then
            echo "ERROR: diff_runs did not gate on a known regression"; exit 1
          fi
          echo "diff_runs gate verified"

  security-audit:
    name: Supply-chain audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Audit runtime dependencies
        run: pip-audit -r requirements.txt --strict
